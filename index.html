  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

  header{position:sticky;top:0;z-index:100;background:rgba(14,14,14,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
  .logo{display:flex;align-items:baseline;gap:6px}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1}
  .logo-sub{font-size:11px;font-weight:300;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
  .wa-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;background:#25d366;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:none;border-radius:99px;cursor:pointer;white-space:nowrap;transition:opacity .15s}

  .hero{padding:2.5rem 1.5rem 1.5rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}

  .hero-title span{color:var(--accent)}
  .hero-meta{font-size:13px;color:var(--muted);font-weight:300}
  .hero-meta strong{color:var(--text);font-weight:500}

  .tabs-wrapper{position:sticky;top:64px;z-index:90;background:rgba(14,14,14,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs-wrapper::-webkit-scrollbar{display:none}
  .tab{padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;display:flex;align-items:center;gap:5px}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
  .tab-count{font-size:10px;background:rgba(255,255,255,.08);padding:2px 6px;border-radius:99px;color:var(--muted)}
  .tab.active .tab-count{background:rgba(245,197,24,.15);color:var(--accent)}

  .section{padding:2rem 1.5rem;display:none}
  .section.visible{display:block}
  .section-heading{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--muted);margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
  .section-heading::after{content:'';flex:1;height:1px;background:var(--border)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(min-width:540px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}

  .card-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;background:#161616}

  .card:hover .card-img-wrap img{transform:scale(1.04)}
  .card-body{padding:10px 12px 12px}
  .card-name{font-size:12.5px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:4px}
  .card-cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .badge-remate{position:absolute;top:8px;left:8px;background:var(--accent2);color:#fff;font-size:9px;font-weight:500;letter-spacing:1px;padding:3px 7px;border-radius:4px;text-transform:uppercase}

  .btn-wa{flex:1;padding:11px;background:#25d366;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s}

  .btn-close{padding:11px 16px;background:rgba(255,255,255,.06);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;border:1px solid var(--border);border-radius:10px;cursor:pointer}

  /* MODAL NOMBRE */

// ── RENDER ─────────────────────────────────────────────────
function makeCard(item, catLabel){
  const n=item.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const c=catLabel.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const badge = item.remate
    ? '<span class="badge-remate">Remate</span>'
    : item.danio
    ? '<span class="badge-danio">Daño en caja</span>'
    : '';
  return `<div class="card" onclick="openLightbox('${item.id}','${n}','${c}')">
    ${badge}
    <div class="card-img-wrap"><img src="${driveThumb(item.id)}" alt="${item.name}" loading="lazy"></div>
    <div class="card-body"><div class="card-name">${item.name}</div><div class="card-cat">${catLabel}</div></div>
  </div>`;
}

function buildAll(){
  const tabsEl = document.getElementById('tabs');
  const secEl  = document.getElementById('sections');
  let total=0, allHtml='';

  // Tab "Todos"
  tabsEl.innerHTML = `<button class="tab active" data-target="all">Todos <span class="tab-count" id="cnt-all">—</span></button>`;
  secEl.innerHTML  = `<div id="sec-all" class="section visible"></div>`;

  catalog.forEach(cat => {
    total += cat.items.length;
    // Tab
    tabsEl.innerHTML += `<button class="tab" data-target="${cat.key}">${cat.label} <span class="tab-count" id="cnt-${cat.key}">—</span></button>`;
    // Section
    const cards = cat.items.map(i=>makeCard(i,cat.label)).join('');
    secEl.innerHTML += `<div id="sec-${cat.key}" class="section"><div class="grid">${cards}</div></div>`;
    document.getElementById(`cnt-${cat.key}`).textContent = cat.items.length;
    allHtml += `<div class="all-section-group"><div class="section-heading">${cat.label}</div><div class="grid">${cards}</div></div>`;
  });

  document.getElementById('sec-all').innerHTML = allHtml;
  document.getElementById('cnt-all').textContent = total;
  document.getElementById('total-count').textContent = total;

  // Bind tabs
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
      tab.classList.add('active');
      document.getElementById('sec-'+tab.dataset.target).classList.add('visible');
      window.scrollTo({top:0,behavior:'smooth'});
      if(typeof gtag!=='undefined') gtag('event','ver_categoria',{categoria:tab.dataset.target});
    });
  });
}

// ── LIGHTBOX ───────────────────────────────────────────────
function openLightbox(imgId,name,cat){
  lbCurrent={imgId,name,cat};
  document.getElementById('lb-img').src=driveFull(imgId);
  document.getElementById('lb-name').textContent=name;
  document.getElementById('lb-cat').textContent=cat;
  document.getElementById('lightbox').classList.add('open');
  if(typeof trackFigure!=='undefined') trackFigure(name,cat);
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
function handleLbWA(){ openNameModal(lbCurrent.name,lbCurrent.cat,driveFull(lbCurrent.imgId)); }

// ── MODAL NOMBRE ───────────────────────────────────────────
function openNameModal(figName,catName,imgUrl){
  nmCurrent={figName,catName,imgUrl};
  document.getElementById('nm-input').value='';
  document.getElementById('nm-preview').classList.remove('visible');
  document.getElementById('nm-send').disabled=true;
  document.getElementById('nameModal').classList.add('open');
  setTimeout(()=>document.getElementById('nm-input').focus(),150);
}
function closeNameModal(){ document.getElementById('nameModal').classList.remove('open'); }

function updatePreview(){
  const nombre=document.getElementById('nm-input').value.trim();
  const btn=document.getElementById('nm-send');
  const prev=document.getElementById('nm-preview');
  if(nombre.length<2){btn.disabled=true;prev.classList.remove('visible');return;}
  btn.disabled=false;
  prev.textContent='📩 '+buildMsg(nombre);
  prev.classList.add('visible');
}

function buildMsg(nombre){
  const{figName,catName}=nmCurrent;
  if(catName==='General')
    return `Hola, soy ${nombre} y estoy interesado en tu catálogo de Funkos. ¿Me puedes dar más información?`;
  return `Hola, soy ${nombre} y estoy interesado en la figura: ${figName} (${catName}). ¿Está disponible?`;
}

function sendWA(){
  const nombre=document.getElementById('nm-input').value.trim();
  if(!nombre)return;
  if(typeof trackWA!=='undefined') trackWA(nmCurrent.figName,nmCurrent.catName);
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(buildMsg(nombre))}`,'_blank');
  closeNameModal();
}

document.getElementById('nm-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!document.getElementById('nm-send').disabled) sendWA();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeLightbox();closeNameModal();}
});

buildAll();
</script>
